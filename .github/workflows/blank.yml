name: Build EconomyShop Phar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Show files
        run: ls -la

      - name: Extract ZIP
        run: unzip -o SunilShopFA.zip -d extracted

      - name: Show extracted
        run: find extracted -type f | sort

      - name: Build Phar
        run: |
          php -d phar.readonly=0 << 'EOF'
          <?php
          $srcDir  = __DIR__ . '/extracted/SunilShopFA';
          $outFile = __DIR__ . '/EconomyShop.phar';

          if (!is_dir($srcDir)) {
              die("ERROR: Folder not found: $srcDir\n");
          }

          if (file_exists($outFile)) unlink($outFile);

          $phar = new Phar($outFile);
          $phar->startBuffering();
          $phar->setStub('<?php __HALT_COMPILER();');

          $iter = new RecursiveIteratorIterator(
              new RecursiveDirectoryIterator($srcDir, FilesystemIterator::SKIP_DOTS)
          );

          foreach ($iter as $file) {
              if ($file->isDir()) continue;
              $rel = ltrim(str_replace($srcDir, '', $file->getRealPath()), '/\\');
              $rel = str_replace('\\', '/', $rel);
              $phar->addFile($file->getRealPath(), $rel);
              echo "Added: $rel\n";
          }

          $phar->stopBuffering();
          echo "\nDone! Size: " . round(filesize($outFile)/1024, 2) . " KB\n";
          EOF

      - name: Verify
        run: |
          if [ -f EconomyShop.phar ]; then
            echo "SUCCESS!"
            ls -lh EconomyShop.phar
          else
            echo "FAILED!"
            exit 1
          fi

      - name: Upload Phar
        uses: actions/upload-artifact@v4
        with:
          name: EconomyShop-phar
          path: EconomyShop.phar
          retention-days: 30
          
