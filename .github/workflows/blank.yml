name: Build EconomyShop Phar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, zip

      - name: Show repo files
        run: ls -la

      - name: Extract ZIP
        run: unzip -o SunilShop.zip

      - name: Show extracted files
        run: |
          echo "=== Extracted ==="
          ls -la
          echo "=== Plugin folder ==="
          ls EconomyShopFINAL/ || echo "EconomyShopFINAL not found"

      - name: Build Phar
        run: |
          php -d phar.readonly=0 -r "
          \$srcDir  = __DIR__ . '/EconomyShopFINAL';
          \$outFile = __DIR__ . '/EconomyShop.phar';
          if (!is_dir(\$srcDir)) {
              die('ERROR: Folder not found: ' . \$srcDir . PHP_EOL);
          }
          if (file_exists(\$outFile)) unlink(\$outFile);
          \$phar = new Phar(\$outFile);
          \$phar->startBuffering();
          \$phar->setStub('<?php __HALT_COMPILER();');
          \$iter = new RecursiveIteratorIterator(
              new RecursiveDirectoryIterator(\$srcDir, FilesystemIterator::SKIP_DOTS)
          );
          foreach (\$iter as \$file) {
              if (\$file->isDir()) continue;
              \$rel = str_replace(\$srcDir . DIRECTORY_SEPARATOR, '', \$file->getRealPath());
              \$rel = str_replace(DIRECTORY_SEPARATOR, '/', \$rel);
              \$phar->addFile(\$file->getRealPath(), \$rel);
              echo 'Added: ' . \$rel . PHP_EOL;
          }
          \$phar->stopBuffering();
          echo 'Done! Size: ' . round(filesize(\$outFile)/1024, 2) . ' KB' . PHP_EOL;
          "

      - name: Verify Phar built
        run: |
          if [ -f EconomyShop.phar ]; then
            echo "SUCCESS: EconomyShop.phar created!"
            ls -lh EconomyShop.phar
          else
            echo "FAILED: Phar not created!"
            exit 1
          fi

      - name: Upload Phar
        uses: actions/upload-artifact@v4
        with:
          name: EconomyShop-phar
          path: EconomyShop.phar
          retention-days: 30
          
