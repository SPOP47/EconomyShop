name: Build EconomyShop Phar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, zip

      - name: Check files
        run: |
          echo "=== Repo files ==="
          ls -la

      - name: Extract ZIP
        run: unzip -o SunilShop.zip

      - name: Check extracted folder
        run: |
          echo "=== After extract ==="
          ls -la

      - name: Build Phar
        run: |
          php -d phar.readonly=0 << 'PHPSCRIPT'
          <?php
          $srcDir  = __DIR__ . '/EconomyShopFINAL';
          $outFile = __DIR__ . '/EconomyShop.phar';

          if (file_exists($outFile)) {
              unlink($outFile);
          }

          $phar = new Phar($outFile);
          $phar->startBuffering();
          $phar->setStub('<?php __HALT_COMPILER();');

          $iterator = new RecursiveIteratorIterator(
              new RecursiveDirectoryIterator($srcDir, FilesystemIterator::SKIP_DOTS)
          );

          foreach ($iterator as $file) {
              if ($file->isDir()) continue;
              $filePath     = $file->getRealPath();
              $relativePath = str_replace($srcDir . DIRECTORY_SEPARATOR, '', $filePath);
              $relativePath = str_replace(DIRECTORY_SEPARATOR, '/', $relativePath);
              $phar->addFile($filePath, $relativePath);
              echo "Added: $relativePath\n";
          }

          $phar->stopBuffering();
          echo "\nDone! Size: " . round(filesize($outFile) / 1024, 2) . " KB\n";
          PHPSCRIPT

      - name: Verify Phar
        run: |
          ls -lh EconomyShop.phar
          echo "Phar ready!"

      - name: Upload Phar
        uses: actions/upload-artifact@v4
        with:
          name: EconomyShop-phar
          path: EconomyShop.phar
          retention-days: 30
