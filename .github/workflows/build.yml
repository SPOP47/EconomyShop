name: Build Plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: List files
        run: ls -la

      - name: Extract ShopSell.zip
        run: unzip -o ShopSell.zip -d extracted

      - name: Show extracted
        run: find extracted -type f | sort

      - name: Build phars
        run: |
          php -d phar.readonly=0 << 'EOF'
          <?php
          function buildPhar(string $srcDir, string $outFile): void {
              if (!is_dir($srcDir)) {
                  echo "SKIP: $srcDir not found\n";
                  return;
              }
              if (file_exists($outFile)) unlink($outFile);
              $phar = new Phar($outFile);
              $phar->startBuffering();
              $phar->setStub('<?php __HALT_COMPILER();');
              $iter = new RecursiveIteratorIterator(
                  new RecursiveDirectoryIterator($srcDir, FilesystemIterator::SKIP_DOTS)
              );
              foreach ($iter as $file) {
                  if ($file->isDir()) continue;
                  $rel = ltrim(str_replace($srcDir, '', $file->getRealPath()), '/\\');
                  $rel = str_replace('\\', '/', $rel);
                  $phar->addFile($file->getRealPath(), $rel);
              }
              $phar->stopBuffering();
              echo "Built: $outFile (" . round(filesize($outFile)/1024, 2) . " KB)\n";
          }

          $base = __DIR__ . '/extracted/Plugin';
          buildPhar("$base/Shop",   __DIR__ . '/Shop.phar');
          buildPhar("$base/SellUI", __DIR__ . '/SellUI.phar');
          buildPhar("$base/XpShop", __DIR__ . '/XpShop.phar');
          echo "All done!\n";
          EOF

      - name: Verify
        run: ls -lh *.phar

      - name: Upload Shop.phar
        uses: actions/upload-artifact@v4
        with:
          name: Shop-phar
          path: Shop.phar
          retention-days: 30

      - name: Upload SellUI.phar
        uses: actions/upload-artifact@v4
        with:
          name: SellUI-phar
          path: SellUI.phar
          retention-days: 30

      - name: Upload XpShop.phar
        uses: actions/upload-artifact@v4
        with:
          name: XpShop-phar
          path: XpShop.phar
          retention-days: 30
          
